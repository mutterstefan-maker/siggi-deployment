<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MailDesk AI – Chefblick</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161a23;
  --surface2: #1e2330;
  --border: #2a2f3d;
  --accent: #4f8ef7;
  --accent2: #7c3aed;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #e8eaf0;
  --text2: #8892a4;
  --text3: #4a5568;
  --radius: 10px;
  --font-mono: 'DM Mono', monospace;
  --font: 'Syne', sans-serif;
}
.light {
  --bg: #f0f2f8;
  --surface: #ffffff;
  --surface2: #e8edf5;
  --border: #d1d9e6;
  --text: #1a1d2e;
  --text2: #5a6478;
  --text3: #9aa3b4;
}
.pink {
  --bg: #1a0a0f;
  --surface: #2d1020;
  --surface2: #3d1530;
  --border: #5d2545;
  --accent: #ff69b4;
  --accent2: #ff1493;
  --text: #ffe4f0;
  --text2: #d4a0b8;
  --text3: #8a5070;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.logo h1 {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.5px;
  color: var(--accent);
  line-height: 1.2;
}
.logo span { color: var(--text2); font-size: 11px; font-weight: 400; display: block; margin-top: 2px; }
.nav { padding: 12px 10px; flex: 1; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  transition: all 0.15s;
  position: relative;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: rgba(79,142,247,0.12); color: var(--accent); }
.nav-item .icon { width: 20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; opacity:0.8; }
.nav-item.active .icon { opacity:1; }
.nav-item .icon svg { stroke: currentColor; }
.badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 20px;
  font-family: var(--font-mono);
}
.badge.warn { background: var(--warning); }
.badge.danger { background: var(--danger); }

.sidebar-bottom {
  padding: 12px 10px;
  border-top: 1px solid var(--border);
}
.auto-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  background: var(--surface2);
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
}
.toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  margin-left: auto;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--border);
  border-radius: 20px;
  transition: 0.3s;
}
.slider:before {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}
input:checked + .slider { background: var(--success); }
input:checked + .slider:before { transform: translateX(16px); }

/* ── Main ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100vh;
}
.topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 12px;
}
.topbar h2 { font-size: 15px; font-weight: 700; flex: 1; }
.btn {
  padding: 7px 14px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #3d7de8; }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}
.status-dot.off { background: var(--text3); animation: none; }
@keyframes pulse {
  0%,100% { opacity: 1; } 50% { opacity: 0.4; }
}

/* ── Content ── */
.content { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 56px); }
.content.full { display: block; overflow-y: auto; padding: 24px; }
.mail-list {
  width: 360px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  height: 100%;
}
.mail-list::-webkit-scrollbar { width: 4px; }
.mail-list::-webkit-scrollbar-track { background: transparent; }
.mail-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.mail-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.mail-item:hover { background: var(--surface2); }
.mail-item.active { background: rgba(79,142,247,0.08); border-left: 3px solid var(--accent); }
.mail-item.unread .mail-from { color: var(--text); font-weight: 700; }
.mail-item.unread::after {
  content: '';
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 5px;
  height: 5px;
  background: var(--accent);
  border-radius: 50%;
}
.mail-from { font-size: 13px; color: var(--text2); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.mail-subject { font-size: 12px; color: var(--text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.mail-preview { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mail-date { font-size: 10px; color: var(--text3); font-family: var(--font-mono); margin-top: 4px; }
.cat-tag {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 4px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.tag-inbox { background: rgba(79,142,247,0.15); color: var(--accent); }
.tag-callbacks { background: rgba(245,158,11,0.15); color: var(--warning); }
.tag-invoices { background: rgba(124,58,237,0.15); color: #a78bfa; }
.tag-knowledge_gap { background: rgba(239,68,68,0.15); color: var(--danger); }
.tag-spam { background: rgba(239,68,68,0.2); color: #ff6b6b; }

/* ── Mail Detail ── */
.mail-detail {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  height: 100%;
}
.mail-detail::-webkit-scrollbar { width: 4px; }
.mail-detail::-webkit-scrollbar-thumb { background: var(--border); }
.detail-header {
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.detail-subject { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.detail-meta { font-size: 12px; color: var(--text2); display: flex; gap: 16px; flex-wrap: wrap; }
.detail-meta span { display: flex; align-items: center; gap: 4px; }

.mail-body-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  color: var(--text2);
}
.ai-reply-card {
  background: rgba(79,142,247,0.06);
  border: 1px solid rgba(79,142,247,0.2);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
}
.ai-reply-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  font-family: var(--font-mono);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ai-reply-text {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
}
.reply-textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-mono);
  resize: vertical;
  min-height: 120px;
  outline: none;
  transition: border-color 0.2s;
}
.reply-textarea:focus { border-color: var(--accent); }
.action-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

/* ── Empty State ── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text3);
  gap: 8px;
}
.empty .icon { font-size: 40px; }
.empty p { font-size: 13px; }

/* ── Settings ── */
.settings-panel {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  height: 100%;
}
.settings-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.settings-section h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 16px;
  font-family: var(--font-mono);
}
.form-row { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input, .form-textarea, .form-select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 9px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 80px; font-family: var(--font-mono); }
.account-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
}
.account-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.account-email { font-size: 13px; font-weight: 700; font-family: var(--font-mono); flex: 1; }
.gap-prompt-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.gap-prompt-info { flex: 1; }
.gap-trigger { font-size: 11px; color: var(--danger); font-weight: 700; margin-bottom: 3px; }
.gap-response { font-size: 12px; color: var(--text2); }


.ig-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.ig-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform 0.15s;
}
.ig-card:hover { transform: translateY(-2px); }
.ig-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.ig-card-label {
  padding: 8px 10px;
  font-size: 11px;
  color: var(--text2);
  font-family: var(--font-mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ig-card.first { border: 2px solid var(--accent); }
.ig-card.first .ig-card-label::before { content: '▶ '; color: var(--accent); }
.day-toggle {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
}
.day-btn {
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-family: var(--font-mono);
  transition: all 0.15s;
}
.day-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.ig-history-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.ig-status-posted { color: var(--success); font-weight: 700; }
.ig-status-error { color: var(--danger); font-weight: 700; }
.ig-status-processing { color: var(--warning); font-weight: 700; }


/* ── Mobile ── */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
}
.hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: var(--text2);
  border-radius: 2px;
  transition: 0.3s;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}
@media (max-width: 768px) {
  body { overflow: hidden; }
  .sidebar {
    position: fixed;
    left: -260px;
    top: 0;
    height: 100vh;
    z-index: 100;
    transition: left 0.25s ease;
    width: 240px;
  }
  .sidebar.open { left: 0; }
  .sidebar-overlay.open { display: block; }
  .hamburger { display: flex; }
  .main { width: 100vw; }
  .topbar { padding: 0 12px; gap: 8px; }
  .topbar h2 { font-size: 13px; }
  #search-input { max-width: 140px !important; font-size: 11px !important; }
  .mail-list { width: 100% !important; }
  .mail-detail { display: none !important; }
  .mail-list.hide { display: none !important; }
  .mail-detail.show { display: flex !important; width: 100% !important; }
  .content { flex-direction: column; }
  .settings-panel { padding: 16px; }
  .settings-section { padding: 14px; }
}

/* ── Loading ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 8px;
  color: var(--text3);
  font-size: 13px;
}
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: slideIn 0.2s ease;
  min-width: 200px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── Responsive scrollbars ── */
.mail-list, .mail-detail, .settings-panel {
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* ── JARVIS ── */
.jarvis-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: calc(100vh - 56px);
  background: radial-gradient(ellipse at center, #001a2e 0%, #000508 70%);
  padding: 30px 20px;
  position: relative;
  overflow: hidden;
}
.jarvis-container::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,180,255,0.03) 40px, rgba(0,180,255,0.03) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,180,255,0.03) 40px, rgba(0,180,255,0.03) 41px);
  pointer-events: none;
}
.jarvis-orb {
  position: relative;
  width: 200px;
  height: 200px;
  margin: 20px 0;
}
.jarvis-orb svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
.jarvis-orb .ring {
  transform-origin: center;
}
.jarvis-orb.speaking .ring-1 { animation: spin1 2s linear infinite; }
.jarvis-orb.speaking .ring-2 { animation: spin2 3s linear infinite; }
.jarvis-orb.speaking .ring-3 { animation: spin3 4s linear infinite; }
.jarvis-orb.listening .ring-1 { animation: spin1 0.8s linear infinite; }
.jarvis-orb.listening .ring-2 { animation: spin2 1.2s linear infinite; }
.jarvis-orb.listening .ring-3 { animation: spin3 1.6s linear infinite; }
@keyframes spin1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes spin2 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
@keyframes spin3 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes pulse-core { 0%,100% { opacity:0.8; r:28; } 50% { opacity:1; r:32; } }
.jarvis-orb.speaking .core { animation: pulse-core 0.5s ease-in-out infinite; }
.jarvis-orb.listening .core { animation: pulse-core 0.3s ease-in-out infinite; }
.jarvis-status {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: #00b4ff;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 8px;
  height: 16px;
}
.jarvis-name {
  font-family: 'Courier New', monospace;
  font-size: 28px;
  font-weight: 900;
  color: #00b4ff;
  letter-spacing: 8px;
  text-shadow: 0 0 20px rgba(0,180,255,0.8), 0 0 40px rgba(0,180,255,0.4);
  margin-bottom: 4px;
}
.jarvis-subtitle {
  font-family: 'Courier New', monospace;
  font-size: 9px;
  color: rgba(0,180,255,0.5);
  letter-spacing: 4px;
  margin-bottom: 30px;
}
.jarvis-transcript {
  width: 100%;
  max-width: 700px;
  min-height: 120px;
  max-height: 300px;
  overflow-y: auto;
  background: rgba(0,20,40,0.8);
  border: 1px solid rgba(0,180,255,0.2);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.8;
  color: #e0f4ff;
}
.jarvis-msg-jarvis { color: #00b4ff; }
.jarvis-msg-jarvis::before { content: 'SIGGI ▸ '; color: rgba(0,180,255,0.6); font-size: 10px; }
.jarvis-msg-user { color: #ffffff; text-align: right; }
.jarvis-msg-user::before { content: 'MUTTI ▸ '; color: rgba(255,255,255,0.4); font-size: 10px; }
.jarvis-msg-system { color: rgba(0,180,255,0.4); font-size: 10px; text-align: center; }
.jarvis-controls {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 20px;
}
.jarvis-mic-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 2px solid #00b4ff;
  background: rgba(0,180,255,0.1);
  color: #00b4ff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  box-shadow: 0 0 20px rgba(0,180,255,0.2);
}
.jarvis-mic-btn:hover { background: rgba(0,180,255,0.2); box-shadow: 0 0 30px rgba(0,180,255,0.4); }
.jarvis-mic-btn.active { background: rgba(255,60,60,0.2); border-color: #ff3c3c; color: #ff3c3c; box-shadow: 0 0 30px rgba(255,60,60,0.4); animation: mic-pulse 1s ease-in-out infinite; }
@keyframes mic-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.jarvis-text-input {
  flex: 1;
  max-width: 500px;
  background: rgba(0,20,40,0.8);
  border: 1px solid rgba(0,180,255,0.3);
  border-radius: 30px;
  padding: 12px 20px;
  color: #e0f4ff;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  outline: none;
}
.jarvis-text-input:focus { border-color: #00b4ff; box-shadow: 0 0 15px rgba(0,180,255,0.2); }
.jarvis-text-input::placeholder { color: rgba(0,180,255,0.3); }
.jarvis-send-btn {
  padding: 12px 24px;
  border-radius: 30px;
  border: 1px solid rgba(0,180,255,0.4);
  background: rgba(0,180,255,0.1);
  color: #00b4ff;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.3s;
}
.jarvis-send-btn:hover { background: rgba(0,180,255,0.2); }
.jarvis-quick-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 700px;
}
.jarvis-quick-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(0,180,255,0.25);
  background: rgba(0,20,40,0.6);
  color: rgba(0,180,255,0.7);
  font-family: 'Courier New', monospace;
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.jarvis-quick-btn:hover { border-color: #00b4ff; color: #00b4ff; background: rgba(0,180,255,0.1); }

/* ── Compose Modal ── */
.compose-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.compose-overlay.open { display: flex; }
.compose-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 560px;
  max-width: 95vw;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.compose-modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.compose-modal .compose-row { display: flex; flex-direction: column; gap: 4px; }
.compose-modal label { font-size: 11px; color: var(--text2); font-weight: 600; letter-spacing: 0.5px; }
.compose-modal input, .compose-modal textarea {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  width: 100%;
}
.compose-modal input:focus, .compose-modal textarea:focus { border-color: var(--accent); }
.compose-modal textarea { min-height: 160px; resize: vertical; }
.compose-modal .compose-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <h1>MailDesk AI</h1>
    <span>Chefblick Dashboard</span>
    <button class="btn btn-primary" style="margin-top:12px;width:100%;font-size:12px" onclick="openCompose()">✉️ Neue E-Mail</button>
  </div>
  <nav class="nav">
    <div class="nav-item active" data-view="inbox">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg></span> Posteingang

      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.72A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.18 6.18l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></span> Rückrufe

    <div class="nav-item" data-view="invoices">

      <span class="badge" id="badge-invoices" style="background:var(--accent2)">0</span>

      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span> Wissenslücken
      <span class="badge danger" id="badge-knowledge_gap">0</span>
    </div>
    <div class="nav-item" data-view="sent">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></span> Gesendet
    </div>
    <div class="nav-item" data-view="spam">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></span> Spam
      <span class="badge danger" id="badge-spam" style="display:none">0</span>
    </div>
    <div class="nav-item" data-view="trash">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></span> Papierkorb
      <span class="badge" id="badge-trash" style="background:var(--text3)">0</span>
    </div>
    <div class="nav-item" data-view="instagram">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></span> Instagram
    </div>
    <div class="nav-item" data-view="jarvis">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/><path d="M3.6 9h.01M3.6 15h.01M20.4 9h.01M20.4 15h.01"/></svg></span> SIGGI
    </div>
    <div class="nav-item" data-view="contacts">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span> Kontakte
      <span class="badge" id="badge-contacts" style="background:var(--accent2)"></span>
    </div>
    <div class="nav-item" data-view="audit">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></span> Website Audit
    </div>
    <div class="nav-item" data-view="stats">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span> Statistik
    </div>
    <div class="nav-item" data-view="settings">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span> Einstellungen
    </div>
  </nav>
  <div class="sidebar-bottom">
    <div class="auto-toggle">
      <div class="status-dot" id="status-dot"></div>
      <span>Auto-Modus</span>
      <label class="toggle-switch">
        <input type="checkbox" id="global-toggle" onchange="toggleGlobal(this.checked)">
        <span class="slider"></span>
      </label>
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="hamburger" id="hamburger" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </div>
    <h2 id="view-title">Posteingang</h2>
    <input type="text" id="search-input" placeholder="🔍 Suche..." style="flex:1;max-width:260px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-size:12px;font-family:var(--font);outline:none" oninput="searchMails(this.value)">
    <button class="btn btn-ghost" onclick="fetchNow()">🔄 Abrufen</button>
    <button class="btn btn-danger" id="clear-btn" style="display:none" onclick="clearCurrentView()">🗑️ Alle löschen</button>
    <button class="btn btn-primary" id="trash-btn" style="display:none" onclick="emptyTrash()">🗑️ Leeren</button>
  </div>
  <div class="content" id="main-content">
    <!-- Dynamisch befüllt -->
  </div>
</div>

<!-- Compose Modal -->
<div class="compose-overlay" id="compose-overlay" onclick="if(event.target===this)closeCompose()">
  <div class="compose-modal">
    <h3>✉️ Neue E-Mail</h3>
    <div class="compose-row">
      <label>AN</label>
      <input type="email" id="compose-to" placeholder="empfaenger@beispiel.de">
    </div>
    <div class="compose-row">
      <label>BETREFF</label>
      <input type="text" id="compose-subject" placeholder="Betreff">
    </div>
    <div class="compose-row">
      <label>NACHRICHT</label>
      <textarea id="compose-body" placeholder="Deine Nachricht..."></textarea>
    </div>
    <div class="compose-actions">
      <button class="btn" onclick="closeCompose()">Abbrechen</button>
      <button class="btn btn-primary" onclick="sendComposedMail()">Senden ✉️</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toasts"></div>

<script>
const API = '';
let currentView = 'inbox';
let currentMailId = null;
let settings = {};

const VIEW_TITLES = {
  inbox: 'Posteingang',
  callbacks: 'Rückrufe',
  invoices: 'Rechnungen',
  knowledge_gap: 'Wissenslücken',
  sent: 'Gesendet',
  trash: 'Papierkorb',
  settings: 'Einstellungen',
  stats: 'Statistik',
  spam: 'Spam',
  instagram: 'Instagram Marketing',
  audit: 'Website Audit',
  jarvis: 'SIGGI',
  contacts: 'Kontakte / CRM'
};

// ── Init ──────────────────────────────────────────────────────────────────

async function init() {
  await loadSettings();
  applyTheme();
  loadCounts();
  showView('inbox');
  setInterval(loadCounts, 30000);

  document.querySelectorAll('.nav-item[data-view]').forEach(item => {
    item.addEventListener('click', () => showView(item.dataset.view));
  });
}

// ── Views ─────────────────────────────────────────────────────────────────

async function showView(view) {
  currentView = view;
  currentMailId = null;

  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelector(`.nav-item[data-view="${view}"]`)?.classList.add('active');
  document.getElementById('view-title').textContent = VIEW_TITLES[view] || view;
  document.getElementById('trash-btn').style.display = view === 'trash' ? 'flex' : 'none';
  const showClear = ['sent','inbox','callbacks','invoices','knowledge_gap','spam'].includes(view);
  document.getElementById('clear-btn').style.display = showClear ? 'flex' : 'none';

  if (view === 'settings') {
    renderSettings();
    return;
  }
  if (view === 'jarvis') {
    renderJarvis();
    return;
  }
  if (view === 'audit') {
    renderAudit();
    return;
  }
  if (view === 'instagram') {
    renderInstagram();
    return;
  }
  if (view === 'stats') {
    renderStats();
    return;
  }
  if (view === 'contacts') {
    renderContacts();
    return;
  }
  // spam handled by renderMailView

  renderMailView(view);
}

async function renderMailView(view) {
  const content = document.getElementById('main-content');
  content.style.cssText = 'display:flex;flex:1;overflow:hidden;height:calc(100vh - 56px)';
  content.innerHTML = `<div class="loading"><div class="spinner"></div> Lade...</div>`;

  const mails = await apiFetch(`/api/mails/${view}`);

  if (!mails || !mails.length) {
    content.innerHTML = `
      <div class="mail-list"></div>
      <div class="mail-detail"><div class="empty"><div class="icon">📭</div><p>Keine E-Mails</p></div></div>
    `;
    return;
  }

  const listHTML = mails.map(m => mailItemHTML(m, view)).join('');

  content.innerHTML = `
    <div class="mail-list" id="mail-list">${listHTML}</div>
    <div class="mail-detail" id="mail-detail"><div class="empty"><div class="icon">👆</div><p>E-Mail auswählen</p></div></div>
  `;

  document.querySelectorAll('.mail-item').forEach(item => {
    item.addEventListener('click', () => openMail(parseInt(item.dataset.id), view));
  });
}

function mailItemHTML(m, view) {
  const from = view === 'sent' ? `An: ${m.to_addr}` : cleanFrom(m.from_addr || '');
  const subject = m.subject || '(Kein Betreff)';
  const preview = (m.body || m.ai_reply || '').replace(/\n/g, ' ').substring(0, 80);
  const date = formatDate(m.date || m.sent_at || m.created_at);
  const isUnread = !m.read && view !== 'sent' && view !== 'trash';
  const catTag = view === 'inbox' ? `<span class="cat-tag tag-${m.category}">${m.category}</span>` : '';
  const ticketTag = m.ticket_nr ? `<span style="font-size:9px;color:var(--text3);font-family:var(--font-mono)">${m.ticket_nr}</span>` : '';
  const newCustTag = m.is_new_customer ? `<span style="font-size:9px;background:rgba(34,197,94,0.15);color:var(--success);padding:1px 5px;border-radius:4px;font-family:var(--font-mono);font-weight:700">★ NEUKUNDE</span>` : '';

  return `<div class="mail-item ${isUnread ? 'unread' : ''}" data-id="${m.id}">
    <div class="mail-from">${escHtml(from)}</div>
    <div class="mail-subject">${escHtml(subject)}</div>
    <div class="mail-preview">${escHtml(preview)}</div>
    ${catTag} ${newCustTag} ${ticketTag}
    <div class="mail-date">${date}</div>
  </div>`;
}

async function openMail(id, view) {
  currentMailId = id;
  document.querySelectorAll('.mail-item').forEach(i => {
    i.classList.toggle('active', parseInt(i.dataset.id) === id);
    if (parseInt(i.dataset.id) === id) i.classList.remove('unread');
  });

  const detail = document.getElementById('mail-detail');
  detail.innerHTML = `<div class="loading"><div class="spinner"></div> Lade...</div>`;

  if (view === 'sent') {
    const mails = await apiFetch(`/api/mails/sent`);
    const m = mails?.find(x => x.id === id);
    if (m) renderSentDetail(m, detail);
    return;
  }
  if (view === 'spam') {
    const m = await apiFetch(`/api/mail/${id}`);
    if (!m) return;
    renderMailDetail(m, detail, view);
    return;
  }

  const m = await apiFetch(`/api/mail/${id}`);
  if (!m) return;
  renderMailDetail(m, detail, view);
  loadCounts();
}

function renderMailDetail(m, container, view) {
  const isGap = m.category === 'knowledge_gap';
  const inTrash = view === 'trash';

  container.innerHTML = `
    <div class="detail-header">
      <div class="detail-subject">${escHtml(m.subject || '(Kein Betreff)')}</div>
      <div class="detail-meta">
        <span>📧 ${escHtml(cleanFrom(m.from_addr || ''))}</span>
        <span>📅 ${formatDate(m.date || m.created_at)}</span>
        ${m.has_attachment ? `<span>📎 ${escHtml(m.attachment_names || 'Anhang')}</span>` : ''}
        <span class="cat-tag tag-${m.category}">${m.category}</span>
        ${m.ticket_nr ? `<span style="font-family:var(--font-mono);font-size:11px;background:var(--surface2);padding:2px 8px;border-radius:4px;color:var(--text2)">🎫 ${m.ticket_nr}</span>` : ''}
        ${m.is_new_customer ? `<span style="font-size:11px;background:rgba(34,197,94,0.15);color:var(--success);padding:2px 8px;border-radius:4px;font-weight:700">★ Neukunde</span>` : ''}
        ${m.is_auto_reply ? '<span style="font-size:10px;background:rgba(245,158,11,0.15);color:var(--warning);padding:2px 6px;border-radius:4px;font-family:var(--font-mono)">🤖 AUTO-REPLY</span>' : ''}
        ${m.is_spam ? '<span style="font-size:10px;background:rgba(239,68,68,0.2);color:#ff6b6b;padding:2px 6px;border-radius:4px;font-family:var(--font-mono)">🚫 SPAM</span>' : ''}
      </div>
    </div>

    <div class="mail-body-card">${escHtml(m.body || '(Kein Inhalt)')}</div>

    ${m.ai_reply ? `
      <div class="ai-reply-card">
        <div class="ai-reply-label">🤖 KI-Antwort ${m.sent ? '<span style="color:var(--success)">✓ Gesendet</span>' : ''}</div>
        <div class="ai-reply-text">${escHtml(m.ai_reply)}</div>
      </div>` : ''}

    ${isGap ? `
      <div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius);padding:16px;margin-bottom:16px;">
        <div style="font-size:11px;font-weight:700;color:var(--danger);margin-bottom:10px;font-family:var(--font-mono);text-transform:uppercase;">⚠️ Wissenslücke – Prompt hinterlegen</div>
        <input class="form-input" id="gap-trigger" placeholder="Auslöser (z.B. 'Preisanfrage')" style="margin-bottom:8px;">
        <textarea class="form-textarea" id="gap-response" placeholder="Wie soll die KI bei ähnlichen Anfragen reagieren?"></textarea>
        <div class="action-row">
          <button class="btn btn-primary" onclick="saveKnowledgePrompt(${m.id})">💾 Prompt speichern</button>
        </div>
      </div>` : ''}

    ${!inTrash ? `
      <div>
        ${!m.sent ? `<label class="form-label">Antwort bearbeiten & senden</label>
        <textarea class="reply-textarea" id="reply-edit">${escHtml(m.ai_reply || '')}</textarea>` : ''}
        <div class="action-row">
          ${!m.sent ? `<button class="btn btn-primary" onclick="sendManual(${m.id})">📤 Jetzt senden</button>` : ''}
          <button class="btn btn-ghost" onclick="moveMail(${m.id}, 'inbox')">📥 → Posteingang</button>
          <button class="btn btn-ghost" onclick="moveMail(${m.id}, 'callbacks')">📞 → Rückrufe</button>
          <button class="btn btn-ghost" onclick="moveMail(${m.id}, 'invoices')">🧾 → Rechnungen</button>
          <button class="btn btn-ghost" onclick="markSpam(${m.id}, '${m.from_addr?.replace(/'/g, '')}')">🚫 Spam</button>
          <button class="btn btn-danger" onclick="deleteMail(${m.id})">🗑️ Löschen</button>
        </div>
      </div>` : ''}

    ${inTrash ? `
      <div class="action-row">
        <button class="btn btn-ghost" onclick="moveMail(${m.id}, 'inbox')">♻️ Wiederherstellen</button>
        <button class="btn btn-danger" onclick="purgeMail(${m.id})">❌ Endgültig löschen</button>
      </div>` : ''}
    ${!inTrash && m.category === 'spam' ? `
      <div class="action-row">
        <button class="btn btn-ghost" onclick="moveMail(${m.id}, 'inbox')">📥 → Kein Spam</button>
        <button class="btn btn-danger" onclick="deleteMail(${m.id})">🗑️ Löschen</button>
      </div>` : ''}
  `;
}

function renderSentDetail(m, container) {
  container.innerHTML = `
    <div class="detail-header">
      <div class="detail-subject">${escHtml(m.subject || '')}</div>
      <div class="detail-meta">

let _currentAudio = null;

async function jarvisSay(text) {
  // Transcript
  addJarvisMessage(text, 'jarvis');

  // Orb animieren
  if (jarvisOrb) jarvisOrb.classList.add('speaking');
  setJarvisStatus('SPRICHT...');
  jarvisSpeaking = true;

  // Laufendes Audio stoppen
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }

  try {
    const resp = await fetch('/api/voice/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!resp.ok) throw new Error('TTS Fehler ' + resp.status);
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    _currentAudio = audio;
    audio.onended = () => {
      URL.revokeObjectURL(url);
      if (jarvisOrb) jarvisOrb.classList.remove('speaking');
      setJarvisStatus('BEREIT');
      jarvisSpeaking = false;
      _currentAudio = null;
    };
    audio.onerror = () => {
      _currentAudio = null;
      // Fallback auf Browser-Synthese
      if (window.speechSynthesis) {
        const utt = new SpeechSynthesisUtterance(text);
        if (jarvisVoice) utt.voice = jarvisVoice;
        utt.rate = 1.0; utt.pitch = 1.0; utt.volume = 1;
        utt.onend = () => { if (jarvisOrb) jarvisOrb.classList.remove('speaking'); setJarvisStatus('BEREIT'); jarvisSpeaking = false; };
        window.speechSynthesis.speak(utt);
      } else {
        if (jarvisOrb) jarvisOrb.classList.remove('speaking');
        setJarvisStatus('BEREIT');
        jarvisSpeaking = false;
      }
    };
    audio.play();
  } catch(e) {
    console.warn('OpenAI TTS fehlgeschlagen, Fallback:', e);
    // Fallback: Browser-Synthese
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      if (jarvisVoice) utt.voice = jarvisVoice;
      utt.rate = 1.0; utt.pitch = 1.0; utt.volume = 1;
      utt.onend = () => {
        if (jarvisOrb) jarvisOrb.classList.remove('speaking');
        setJarvisStatus('BEREIT');
        jarvisSpeaking = false;
      };
      window.speechSynthesis.speak(utt);
    } else {
      setTimeout(() => {
        if (jarvisOrb) jarvisOrb.classList.remove('speaking');
        setJarvisStatus('BEREIT');
        jarvisSpeaking = false;
      }, text.length * 60);
    }
  }
}

function toggleMic() {
  // Immer laufendes Audio sofort stoppen wenn Mikro-Button gedrückt wird
  if (_currentAudio) { try { _currentAudio.pause(); } catch(e){} _currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (jarvisOrb) jarvisOrb.classList.remove('speaking');
  jarvisSpeaking = false;

  if (jarvisListening) {
    // Zweiter Klick: aufnehmen stoppen und Text senden
    if (jarvisRecognition) jarvisRecognition.stop();
    setTimeout(() => {
      const inp = document.getElementById('jarvis-input');
      const text = (inp ? inp.value.trim() : '') || window._finalTranscriptGlobal || '';
      if (text) {
        if (inp) inp.value = '';
        window._finalTranscriptGlobal = '';
        addJarvisMessage(text, 'user');
        sendJarvisMessageDirect(text);
      }
    }, 100);
  } else {
    startMic();
  }
}

function startMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    jarvisSay('Leider unterstützt dieser Browser keine Spracheingabe, Mutti. Bitte Chrome oder Edge nutzen.');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  jarvisRecognition = new SR();
  jarvisRecognition.lang = 'de-DE';
  jarvisRecognition.continuous = true;
  jarvisRecognition.interimResults = true;

  let _finalTranscript = '';

  jarvisRecognition.onstart = () => {
    jarvisListening = true;
    _finalTranscript = '';
    window._finalTranscriptGlobal = '';
    document.getElementById('jarvis-mic')?.classList.add('active');
    if (jarvisOrb) jarvisOrb.classList.add('listening');
    setJarvisStatus('HÖRE ZU...');
    const hint = document.getElementById('jarvis-mic-hint');
    if (hint) hint.textContent = 'NOCHMAL KLICKEN ZUM SENDEN';
    if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  };

  jarvisRecognition.onresult = (e) => {
    _finalTranscript = '';
    let interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) _finalTranscript += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    window._finalTranscriptGlobal = _finalTranscript.trim();
    const inp = document.getElementById('jarvis-input');
    if (inp) inp.value = (_finalTranscript + interim).trim();
  };

  jarvisRecognition.onend = () => {
    jarvisListening = false;
    document.getElementById('jarvis-mic')?.classList.remove('active');
    if (jarvisOrb) jarvisOrb.classList.remove('listening');
    setJarvisStatus('BEREIT');
    const hint = document.getElementById('jarvis-mic-hint');
    if (hint) hint.textContent = 'TIPPEN ZUM SPRECHEN';
  };

  jarvisRecognition.onerror = (e) => {
    jarvisListening = false;
    document.getElementById('jarvis-mic')?.classList.remove('active');
    if (jarvisOrb) { jarvisOrb.classList.remove('listening'); jarvisOrb.classList.remove('speaking'); }
    const hint = document.getElementById('jarvis-mic-hint');
    if (hint) hint.textContent = 'TIPPEN ZUM SPRECHEN';
    console.log('[Mic] Fehler:', e.error);
    if (e.error === 'not-allowed') {
      setJarvisStatus('MIKROFON BLOCKIERT');
      jarvisSay('Mutti, das Mikrofon ist blockiert. Oben links auf das Schloss-Symbol klicken.');
    } else if (e.error === 'audio-capture') {
      setJarvisStatus('KEIN MIKROFON');
      jarvisSay('Kein Mikrofon gefunden, Mutti.');
    } else {
      setJarvisStatus('BEREIT');
    }
  };

  jarvisRecognition.start();
}

function stopMic() {
  if (jarvisRecognition) jarvisRecognition.stop();
}

function switchJarvisVoice() {

  utt.pitch = 0.7;
  utt.volume = 1;

}

- Rückrufe: ${counts?.callbacks||0}
- Rechnungen: ${counts?.invoices||0}
- Spam: ${counts?.spam||0}
- Heute gesendet: ${todaySent.length}
- Instagram Auto: ${igSettings?.auto_enabled==='1'?'Aktiv':'Inaktiv'}
- Instagram Queue: ${(igQueue||[]).length} Bilder
- Instagram Posts heute: ${todayPosts.length}`;
  } catch(e) { dashData = 'Daten nicht verfügbar.'; }

  jarvisConversation.push({ role: 'user', content: text });
  if (jarvisConversation.length > 10) jarvisConversation = jarvisConversation.slice(-10);

  try {
    const response = await fetch('/api/jarvis/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, conversation: jarvisConversation, dashboard_data: dashData })
    });
    const data = await response.json();
    const reply = data.reply || 'Entschuldigung, Mutti. Kurzer Aussetzer.';
    jarvisConversation.push({ role: 'assistant', content: reply });
    jarvisSay(reply);

    // UI-Aktionen ausführen
    if (data.actions && data.actions.length > 0) {
      for (const action of data.actions) {
        if (action.type === 'navigate') {
          setTimeout(() => {
            const navItem = document.querySelector(`.nav-item[data-view="${action.target}"]`);
            if (navItem) navItem.click();
          }, 1500); // kurze Verzögerung damit SIGGI erst spricht
        } else if (action.type === 'show') {
          setTimeout(() => showSiggiMedia(action.url, action.title), 800);
        } else if (action.type === 'compose') {
          setTimeout(() => openCompose(action.to || '', action.subject || '', action.body || ''), 1000);
        } else if (action.type === 'audit') {
          setTimeout(async () => {
            // Zum Audit-Tab navigieren
            const auditNav = document.querySelector('.nav-item[data-view="audit"]');
            if (auditNav) auditNav.click();
            // Kurz warten bis Audit-UI gerendert ist, dann URL eintragen + starten
            await new Promise(r => setTimeout(r, 800));
            const urlInput = document.getElementById('audit-url');
            if (urlInput) {
              urlInput.value = action.url;
              const startBtn = document.getElementById('audit-start-btn');
              if (startBtn) startBtn.click();
            }
          }, 1500);
        }
      }
    }
  } catch(e) {
    if (jarvisOrb) jarvisOrb.classList.remove('speaking');
    setJarvisStatus('FEHLER');
    jarvisSay('Verbindungsfehler, Mutti. Ich arbeite daran.');
  }
}

async function downloadAuditPdf(filename) {
  // Suche job_id anhand filename
  for (const [jid, job] of Object.entries(window._auditJobs || {})) {
    if (job.pdf_filename === filename) {
      window.open('/api/audit/download/' + jid, '_blank');
      return;
    }
  }
  showToast('Direkt-Download nur für aktuelle Session verfügbar', 'error');
}

async function startAudit() {
  const url = document.getElementById('audit-url')?.value?.trim();
  if (!url) { showToast('Bitte URL eingeben', 'error'); return; }

  const btn = document.getElementById('audit-start-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Analysiere...';

  const resultDiv = document.getElementById('audit-result');
  resultDiv.innerHTML = '';

  // Loading anzeigen
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'settings-section';
  loadingDiv.id = 'audit-loading';
  loadingDiv.innerHTML = `
    <div style="text-align:center;padding:40px">
      <div class="spinner" style="width:40px;height:40px;margin:0 auto 16px"></div>
      <div style="font-size:14px;font-weight:700;color:var(--text)">Website wird analysiert...</div>
      <div id="audit-status-text" style="font-size:12px;color:var(--text2);margin-top:8px">Seite wird geladen</div>
      <div style="margin-top:20px;background:var(--surface2);border-radius:8px;height:6px;overflow:hidden">
        <div id="audit-progress" style="height:100%;background:var(--accent);width:10%;transition:width 2s;border-radius:8px"></div>
      </div>
    </div>`;
  resultDiv.appendChild(loadingDiv);

  // Progress Simulation
  const statusTexts = ['Seite wird geladen...', 'HTML wird analysiert...', 'PageSpeed wird abgerufen...', 'KI-Analyse läuft...', 'PDF wird erstellt...'];
  let si = 0;
  const progressInterval = setInterval(() => {
    const prog = document.getElementById('audit-progress');
    const stxt = document.getElementById('audit-status-text');
    if (prog) prog.style.width = Math.min(90, 10 + si * 20) + '%';
    if (stxt && statusTexts[si]) stxt.textContent = statusTexts[si];
    si++;
  }, 8000);

  const startRes = await apiFetch('/api/audit/start', 'POST', { url });
  if (!startRes || !startRes.success) {
    clearInterval(progressInterval);
    loadingDiv.innerHTML = '<div style="color:var(--danger);padding:20px">Fehler beim Starten: ' + (startRes?.error || 'Unbekannt') + '</div>';
    btn.disabled = false; btn.textContent = '▶ Analyse starten';
    return;
  }

  auditJobId = startRes.job_id;
  if (!window._auditJobs) window._auditJobs = {};

  // Polling
  auditPollInterval = setInterval(async () => {
    const status = await apiFetch('/api/audit/status/' + auditJobId);
    if (!status) return;
    window._auditJobs[auditJobId] = status;

    if (status.status === 'done') {
      clearInterval(auditPollInterval);
      clearInterval(progressInterval);
      const prog = document.getElementById('audit-progress');
      if (prog) prog.style.width = '100%';
      setTimeout(() => renderAuditResult(status), 500);
      btn.disabled = false;
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> Neue Analyse';
      loadAuditHistory();
    } else if (status.status === 'error') {
      clearInterval(auditPollInterval);
      clearInterval(progressInterval);
      loadingDiv.innerHTML = '<div style="color:var(--danger);padding:20px">Fehler: ' + (status.error || 'Unbekannt') + '</div>';
      btn.disabled = false;
      btn.innerHTML = '▶ Analyse starten';
    }
  }, 3000);
}

async function postReelNow() {
  showToast('Reel wird gepostet... (kann 1-2 Min. dauern)', 'success');
  const result = await apiFetch('/api/instagram/reels/post_now', 'POST');
  if (result && result.success) showToast('Reel erfolgreich gepostet!', 'success');
  else showToast('Fehler: ' + (result && result.error || 'Unbekannt'), 'error');
  renderInstagram();
}

async function uploadReel(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const result = await apiFetch('/api/instagram/reels/upload', 'POST', { filename: file.name, data: base64 });
    if (result && result.success) { showToast(file.name + ' hochgeladen', 'success'); renderInstagram(); }
  };
  reader.readAsDataURL(file);
}

async function deleteReel(filename) {
  if (!confirm('Reel "' + filename + '" löschen?')) return;
  const result = await apiFetch('/api/instagram/reels/delete', 'POST', { filename });
  if (result && result.success) { showToast('Gelöscht', 'success'); renderInstagram(); }
}

async function saveReelsSettings() {
  const auto = document.getElementById('reels-auto')?.checked ? '1' : '0';
  const timeInputs = document.querySelectorAll('#reels-times-container input[type=time]');
  const times = Array.from(timeInputs).map(i => i.value).filter(Boolean);
  const poolPath = document.getElementById('reels-pool-path')?.value || '';
  const postedPath = document.getElementById('reels-posted-path')?.value || '';
  // Aktive Tage direkt aus Buttons lesen
  const activeDays = Array.from(document.querySelectorAll('#reels-day-toggle .day-btn.active')).map(b => b.dataset.day);
  const days = activeDays.length ? activeDays : reelsDays;
  const result = await apiFetch('/api/instagram/reels/settings', 'POST', {
    auto_enabled: auto,
    post_times: times.join(','),
    post_days: days.join(','),
    pool_path: poolPath,
    posted_path: postedPath
  });
  if (result && result.success !== false) {
    showToast('Reels-Einstellungen gespeichert', 'success');
  } else {
    showToast('Fehler beim Speichern', 'error');
  }
}

    tabReels.style.cssText = 'border-radius:8px 8px 0 0';
    bilderContainer.style.display = 'block';
    reelsContainer.style.display = 'none';
  };
  tabReels.onclick = async () => {
    tabReels.style.cssText = 'border-radius:8px 8px 0 0;border-bottom:2px solid var(--accent);color:var(--accent);font-weight:700';
    tabBilder.style.cssText = 'border-radius:8px 8px 0 0';
    bilderContainer.style.display = 'none';
    reelsContainer.style.display = 'block';
    reelsContainer.innerHTML = '';
    await renderReels(reelsContainer);
  };

  tabDiv.appendChild(tabBilder);
  tabDiv.appendChild(tabReels);
  wrapper.appendChild(tabDiv);
  wrapper.appendChild(bilderContainer);
  wrapper.appendChild(reelsContainer);

  content.innerHTML = '';
  content.appendChild(wrapper);
}

function createTimeRow(value) {
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:6px;align-items:center';
  const input = document.createElement('input');
  input.className = 'form-input';
  input.type = 'time';
  input.value = value;
  input.style.maxWidth = '140px';
  const removeBtn = document.createElement('button');
  removeBtn.className = 'btn btn-danger';
  removeBtn.style.cssText = 'padding:6px 10px;font-size:12px';
  removeBtn.textContent = '✕';
  removeBtn.onclick = () => row.remove();
  row.appendChild(input);
  row.appendChild(removeBtn);
  return row;
}

function selectFolder(inputId) {
  // Datei im Zielordner auswählen → Ordnerpfad wird extrahiert
  const picker = document.createElement('input');
  picker.type = 'file';
  picker.style.display = 'none';
  picker.onchange = async (e) => {
    if (e.target.files.length > 0) {
      const file = e.target.files[0];
      // Pfad über Server ermitteln
      const result = await apiFetch('/api/instagram/resolve_path', 'POST', { filename: file.name });
      if (result && result.folder) {
        document.getElementById(inputId).value = result.folder;
        showToast('Ordner gesetzt: ' + result.folder, 'success');
      } else {
        // Fallback: manuell eingeben
        const manual = prompt('Ordnerpfad (absolut):', document.getElementById(inputId).value);
        if (manual) document.getElementById(inputId).value = manual;
      }
    }
    picker.remove();
  };
  document.body.appendChild(picker);
  picker.click();
}


async function deleteFlyer(filename) {
  if (!confirm('Bild "' + filename + '" wirklich löschen?')) return;
  const result = await apiFetch('/api/instagram/delete_flyer', 'POST', { filename });
  if (result && result.success) {
    showToast('Bild gelöscht', 'success');
    renderInstagram();
  } else {
    showToast('Fehler beim Löschen', 'error');
  }
}

async function postNow() {
  showToast('Posting wird gestartet... (kann 20-30 Sek. dauern)', 'success');
  const btn = document.querySelector('[onclick="postNow()"]');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Wird verarbeitet...'; }
  const result = await apiFetch('/api/instagram/post_now', 'POST');
  if (result?.success) {
    showToast('Erfolgreich auf Instagram gepostet!', 'success');
  } else {
    showToast('Fehler: ' + (result?.error || 'Unbekannt'), 'error');
  }
  renderInstagram();
}

async function uploadFlyer(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const result = await apiFetch('/api/instagram/upload', 'POST', {
      filename: file.name,
      data: base64
    });
    if (result?.success) {
      showToast(`${file.name} hochgeladen`, 'success');
      renderInstagram();
    } else {
      showToast('Upload fehlgeschlagen', 'error');
    }
  };
  reader.readAsDataURL(file);
}

function toggleDay(day, btn) {
  if (igDays.includes(day)) {
    igDays = igDays.filter(d => d !== day);
    btn.classList.remove('active');
  } else {
    igDays.push(day);
    btn.classList.add('active');
  }
}

async function saveIgSettings() {
  const auto = document.getElementById('ig-auto')?.checked ? '1' : '0';
  const poolPath = document.getElementById('ig-pool-path')?.value || 'flyer_pool';
  const postedPath = document.getElementById('ig-posted-path')?.value || 'flyer_pool/gepostet';
  const timeInputs = document.querySelectorAll('#ig-times-container input[type=time]');
  const times = Array.from(timeInputs).map(i => i.value).filter(Boolean);
  await apiFetch('/api/instagram/settings', 'POST', {
    auto_enabled: auto,
    post_times: times.join(','),
    pool_path: poolPath,
    posted_path: postedPath,
    post_days: igDays.join(',')
  });
  showToast('Instagram-Einstellungen gespeichert', 'success');
}

async function renderContacts() {
  const content = document.getElementById('main-content');
  content.style.cssText = 'display:flex;flex-direction:column;flex:1;overflow:auto;padding:24px;height:calc(100vh - 56px)';
  content.innerHTML = `<div class="loading"><div class="spinner"></div> Lade...</div>`;

  const contacts = await apiFetch('/api/contacts') || [];
  const badge = document.getElementById('badge-contacts');
  if (badge) badge.textContent = contacts.length || '';

  content.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <input id="crm-search" type="text" placeholder="🔍 Suche nach Name, E-Mail, Firma..."
        style="flex:1;min-width:200px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none"
        oninput="filterContacts(this.value)">
      <button class="btn btn-primary" onclick="openContactModal()">+ Neuer Kontakt</button>
    </div>
    <div id="contacts-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px"></div>

  window._allContacts = contacts;

function renderContactCards(list) {
  const grid = document.getElementById('contacts-grid');
  if (!grid) return;
  if (!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text3)">
      <div style="font-size:40px;margin-bottom:12px">👥</div>
      <p>Noch keine Kontakte gespeichert.</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(c => `
    <div class="card" style="cursor:pointer" onclick="openContactModal(${JSON.stringify(c).replace(/"/g,'&quot;')})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:700;font-size:14px;margin-bottom:4px">${escHtml(c.name || c.email)}</div>
          ${c.company ? `<div style="font-size:11px;color:var(--text3);margin-bottom:2px">🏢 ${escHtml(c.company)}</div>` : ''}
          <div style="font-size:11px;color:var(--accent)">✉️ ${escHtml(c.email)}</div>
          ${c.phone ? `<div style="font-size:11px;color:var(--text2);margin-top:2px">📞 ${escHtml(c.phone)}</div>` : ''}
        </div>
        <div style="font-size:10px;color:var(--text3);text-align:right">
          ${c.last_contact ? formatDate(c.last_contact) : ''}
        </div>
      </div>
      ${c.notes ? `<div style="font-size:11px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.5">${escHtml(c.notes.substring(0,120))}${c.notes.length>120?'…':''}</div>` : ''}
    </div>
  `).join('');
}

function filterContacts(q) {
  if (!window._allContacts) return;
  const lq = q.toLowerCase();
  const filtered = q.length < 2 ? window._allContacts
    : window._allContacts.filter(c =>
        (c.name||'').toLowerCase().includes(lq) ||
        (c.email||'').toLowerCase().includes(lq) ||
        (c.company||'').toLowerCase().includes(lq) ||
        (c.phone||'').includes(lq)
      );
  renderContactCards(filtered);
}

function openContactModal(contact = null) {
  const isEdit = contact && contact.id;
  const existing = document.getElementById('contact-modal-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'contact-modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
      <h3 style="margin:0 0 20px;font-size:16px">${isEdit ? '✏️ Kontakt bearbeiten' : '➕ Neuer Kontakt'}</h3>
      <div style="display:flex;flex-direction:column;gap:12px">
        <input id="ci-name" type="text" placeholder="Name *" value="${escHtml(contact?.name||'')}"
          style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none">
        <input id="ci-email" type="email" placeholder="E-Mail *" value="${escHtml(contact?.email||'')}"
          style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none">
        <input id="ci-phone" type="text" placeholder="Telefon" value="${escHtml(contact?.phone||'')}"
          style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none">
        <input id="ci-company" type="text" placeholder="Firma" value="${escHtml(contact?.company||'')}"
          style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none">
        <textarea id="ci-notes" placeholder="Notizen (Projekte, Vereinbarungen, …)" rows="4"
          style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;resize:vertical">${escHtml(contact?.notes||'')}</textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">

        <button class="btn btn-ghost" onclick="document.getElementById('contact-modal-overlay').remove()">Abbrechen</button>
        <button class="btn btn-primary" onclick="saveContact(${isEdit ? contact.id : 'null'})">💾 Speichern</button>
      </div>

  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

async function saveContact(id) {
  const name = document.getElementById('ci-name').value.trim();
  const email = document.getElementById('ci-email').value.trim();
  const phone = document.getElementById('ci-phone').value.trim();
  const company = document.getElementById('ci-company').value.trim();
  const notes = document.getElementById('ci-notes').value.trim();
  if (!email) { showToast('E-Mail ist Pflichtfeld', 'error'); return; }

  const url = id ? `/api/contacts/${id}` : '/api/contacts';
  const res = await apiFetch(url, 'POST', { name, email, phone, company, notes });
  if (res?.success) {
    showToast(id ? 'Kontakt aktualisiert' : 'Kontakt gespeichert', 'success');
    document.getElementById('contact-modal-overlay')?.remove();
    renderContacts();
  } else {
    showToast('Fehler: ' + (res?.error || 'Unbekannt'), 'error');
  }
}

async function deleteContact(id) {
  if (!confirm('Kontakt wirklich löschen?')) return;
  const res = await apiFetch(`/api/contacts/${id}/delete`, 'POST');
  if (res?.success) {
    showToast('Kontakt gelöscht', 'success');
    document.getElementById('contact-modal-overlay')?.remove();
    renderContacts();
  }
}

        ${statCard('❓', 'Wissenslücken', totalGaps, 'var(--danger)')}
        ${statCard('📤', 'Gesendet', totalSent, 'var(--success)')}
        ${statCard('🤖', 'Auto-Rate', autoRate + '%', 'var(--success)')}
        ${statCard('🌅', 'Heute erhalten', daily?.received || 0, 'var(--accent)')}
        ${statCard('📤', 'Heute gesendet', daily?.sent || 0, 'var(--success)')}
        ${statCard('★', 'Neukunden heute', daily?.new_customers || 0, 'var(--warning)')}
        ${statCard('🔄', 'Follow-Ups heute', daily?.followups || 0, 'var(--accent2)')}

        <h3>📅 Tagesreport – Heute</h3>
        ${daily?.recent_sent?.length ? daily.recent_sent.map(s => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px">
            <div>

              <div style="color:var(--text2)">An: ${escHtml(s.to_addr || '')}</div>

      <div class="settings-section">
        <h3>📊 Letzte gesendete Mails</h3>
        ${(sent || []).slice(0,10).map(m => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px">

async function searchMails(query) {
  if (!query || query.length < 2) {
    renderMailView(currentView);
    return;
  }
  const content = document.getElementById('main-content');
  const results = await apiFetch(`/api/search?q=${encodeURIComponent(query)}`);
  if (!results?.length) {
    content.innerHTML = `<div class="mail-list"></div><div class="mail-detail"><div class="empty"><div class="icon">🔍</div><p>Keine Ergebnisse für "${escHtml(query)}"</p></div></div>`;
    return;
  }
  const listHTML = results.map(m => mailItemHTML(m, 'search')).join('');
  content.innerHTML = `<div class="mail-list" id="mail-list">${listHTML}</div><div class="mail-detail" id="mail-detail"><div class="empty"><div class="icon">👆</div><p>E-Mail auswählen</p></div></div>`;
  document.querySelectorAll('.mail-item').forEach(item => {
    item.addEventListener('click', () => openMail(parseInt(item.dataset.id), 'search'));
  });
}


async function clearCurrentView() {
  const viewNames = {inbox:'Posteingang',callbacks:'Rückrufe',invoices:'Rechnungen',knowledge_gap:'Wissenslücken',spam:'Spam',sent:'Gesendet'};
  const name = viewNames[currentView] || currentView;
  if (!confirm(`Alle Mails in "${name}" löschen?`)) return;
  if (currentView === 'sent') {
    const mails = await apiFetch('/api/mails/sent');
    if (mails) for (const m of mails) await apiFetch(`/api/sent/${m.id}/delete`, 'POST');
  } else {
    const mails = await apiFetch(`/api/mails/${currentView}`);
    if (mails) for (const m of mails) await apiFetch(`/api/mail/${m.id}/delete`, 'POST');
  }
  showToast(`${name} geleert`, 'success');
  loadCounts();
  renderMailView(currentView);
}

async function fetchNow() {
  showToast('Abruf gestartet...', 'success');
  const res = await apiFetch('/api/fetch', 'POST');
  if (res) {
    showToast(`${res.new_mails} neue Mail(s) verarbeitet`, 'success');
    loadCounts();
    if (currentView !== 'settings') renderMailView(currentView);
  }
}

async function toggleGlobal(checked) {
  document.getElementById('status-dot').className = 'status-dot' + (checked ? '' : ' off');
  await apiFetch('/api/settings', 'POST', { global_auto: checked });
}

async function deleteMail(id) {
  await apiFetch(`/api/mail/${id}/delete`, 'POST');
  showToast('In Papierkorb verschoben', 'success');
  loadCounts();
  renderMailView(currentView);
}

async function purgeMail(id) {
  if (!confirm('Endgültig löschen?')) return;
  await apiFetch(`/api/mail/${id}/purge`, 'POST');
  showToast('Gelöscht', 'success');
  loadCounts();
  renderMailView('trash');
}

async function deleteSent(id) {
  await apiFetch(`/api/sent/${id}/delete`, 'POST');
  showToast('Gelöscht', 'success');
  renderMailView('sent');
}

async function emptyTrash() {
  if (!confirm('Papierkorb wirklich leeren?')) return;
  await apiFetch('/api/trash/empty', 'POST');
  showToast('Papierkorb geleert', 'success');
  loadCounts();
  renderMailView('trash');
}

async function moveMail(id, category) {
  await apiFetch(`/api/mail/${id}/move`, 'POST', { category });
  showToast(`Verschoben nach: ${category}`, 'success');
  loadCounts();
  renderMailView(currentView);
}

async function sendManual(id) {
  const reply = document.getElementById('reply-edit')?.value;
  await apiFetch(`/api/mail/${id}/send`, 'POST', { reply });
  showToast('Gesendet!', 'success');
  loadCounts();
  renderMailView(currentView);
}

async function saveKnowledgePrompt(mailId) {
  const trigger = document.getElementById('gap-trigger')?.value;
  const response = document.getElementById('gap-response')?.value;
  if (!trigger || !response) { showToast('Auslöser und Anweisung ausfüllen', 'error'); return; }
  await apiFetch('/api/knowledge_gap', 'POST', { trigger, response });
  await moveMail(mailId, 'inbox');
  showToast('Prompt gespeichert!', 'success');
}

async function saveGeneralSettings() {
  const interval = parseInt(document.getElementById('set-interval').value);
  await apiFetch('/api/settings', 'POST', { interval_minutes: interval });
  showToast('Gespeichert', 'success');
}

async function saveAiSettings() {
  const ai_character = document.getElementById('set-ai-char').value;
  const api_key = document.getElementById('set-api-key').value;
  const payload = { ai_character };
  if (api_key) payload.anthropic_api_key = api_key;
  await apiFetch('/api/settings', 'POST', payload);
  showToast('KI-Einstellungen gespeichert', 'success');
}

async function updateAccountActive(email, active) {
  await apiFetch('/api/settings', 'POST', { accounts: { [email]: { active } } });
}

async function saveSignature(email) {
  const sig = document.getElementById(`sig-${email}`)?.value;
  await apiFetch('/api/settings', 'POST', { accounts: { [email]: { signature: sig } } });
  showToast('Signatur gespeichert', 'success');
}

async function addKnowledgePrompt() {
  const trigger = document.getElementById('new-gap-trigger').value;
  const response = document.getElementById('new-gap-response').value;
  if (!trigger || !response) { showToast('Alle Felder ausfüllen', 'error'); return; }
  await apiFetch('/api/knowledge_gap', 'POST', { trigger, response });
  showToast('Prompt hinzugefügt', 'success');
  renderSettings();
}

async function deleteKnowledgePrompt(id) {
  await apiFetch(`/api/knowledge_gap/${id}`, 'DELETE');
  showToast('Gelöscht', 'success');
  renderSettings();
}

function setTheme(theme) {
  document.body.classList.remove('light', 'pink');
  if (theme === 'light') document.body.classList.add('light');
  if (theme === 'pink') document.body.classList.add('pink');
  apiFetch('/api/settings', 'POST', { theme });
}

// ── Helpers ───────────────────────────────────────────────────────────────

async function loadSettings() {
  settings = await apiFetch('/api/settings') || {};
  const autoEl = document.getElementById('global-toggle');
  if (autoEl) autoEl.checked = settings.global_auto || false;
  document.getElementById('status-dot').className = 'status-dot' + (settings.global_auto ? '' : ' off');
  if (settings.theme === 'light') document.body.classList.add('light');
}

async function loadCounts() {
  const counts = await apiFetch('/api/counts');
  if (!counts) return;
  ['inbox', 'callbacks', 'invoices', 'knowledge_gap', 'trash'].forEach(cat => {
    const el = document.getElementById(`badge-${cat}`);
    if (el) {
      el.textContent = counts[cat] || 0;
      el.style.display = counts[cat] ? 'inline-block' : 'none';
    }
  });
}

async function apiFetch(url, method = 'GET', body = null) {
  try {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + url, opts);
    return await res.json();
  } catch (e) {
    console.error(e);
    return null;
  }
}

function applyTheme() {
  document.body.classList.remove('light', 'pink');
  if (settings.theme === 'light') document.body.classList.add('light');
  if (settings.theme === 'pink') document.body.classList.add('pink');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
  t.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function cleanFrom(from) {
  return from.replace(/<[^>]+>/, '').replace(/"/g, '').trim() || from;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch { return dateStr.substring(0, 16); }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


async function markSpam(id, fromAddr) {
  await apiFetch(`/api/mail/${id}/move`, 'POST', { category: 'spam' });
  // Absender zur Blockliste hinzufügen
  if (fromAddr) {
    const emailMatch = fromAddr.match(/<([^>]+)>/);
    const cleanAddr = emailMatch ? emailMatch[1] : fromAddr;
    await apiFetch('/api/spam_sender', 'POST', { sender: cleanAddr });
  }
  showToast('Als Spam markiert & Absender blockiert', 'success');
  loadCounts();
  renderMailView(currentView);
}


function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}

// Mobile: Mail anklicken zeigt Detail, Zurück-Button
const _origOpenMail = openMail;
openMail = async function(id, view) {
  await _origOpenMail(id, view);
  if (window.innerWidth <= 768) {
    const list = document.getElementById('mail-list');
    const detail = document.getElementById('mail-detail');
    if (list) list.classList.add('hide');
    if (detail) { detail.classList.add('show'); }
    // Zurück-Button einfügen
    if (detail && !detail.querySelector('.mobile-back')) {
      const back = document.createElement('button');
      back.className = 'btn btn-ghost mobile-back';
      back.style.cssText = 'margin-bottom:12px;font-size:12px';
      back.innerHTML = '← Zurück';
      back.onclick = () => {
        if (list) list.classList.remove('hide');
        if (detail) detail.classList.remove('show');
      };
      detail.insertBefore(back, detail.firstChild);
    }
  }
};

// Nav-Item klick: Sidebar auf Mobile schließen
document.querySelectorAll('.nav-item[data-view]').forEach(item => {
  item.addEventListener('click', () => {
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar')?.classList.remove('open');
      document.getElementById('sidebar-overlay')?.classList.remove('open');
    }
  });
});

init();
</script>
